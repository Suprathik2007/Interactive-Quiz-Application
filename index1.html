<!DOCTYPE html>
<html>
<head>
<title>Interactive Quiz</title>
<link rel="stylesheet" href="style1.css">
<link rel="shortcut icon" href="quiz.jpg" type="image/x-icon">
</head>

<body>

<div class="quiz-box">

<h1>🧠 Interactive Quiz</h1>

<div id="quiz">

<h2 id="question"></h2>

<div class="options">
<button class="opt" onclick="selectAnswer(0)" id="opt0"></button>
<button class="opt" onclick="selectAnswer(1)" id="opt1"></button>
<button class="opt" onclick="selectAnswer(2)" id="opt2"></button>
<button class="opt" onclick="selectAnswer(3)" id="opt3"></button>
</div>

<button id="nextBtn" onclick="nextQuestion()">Next ➜</button>

</div>

<div id="result"></div>

<button id="restart" onclick="restartQuiz()">Restart Quiz 🔄</button>

</div>

<script src="script.js"></script>

</body>
</html>
